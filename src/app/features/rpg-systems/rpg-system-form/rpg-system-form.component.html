<!-- rpg-system-form.component.html -->
<div class="rpg-system-form">
  <h2 class="rpg-system-form__title">
    {{ isEditMode ? 'Editar Sistema de RPG' : 'Criar Novo Sistema de RPG' }}
  </h2>

  <form (ngSubmit)="onSubmit()" #systemForm="ngForm" class="rpg-system-form__form">
    <div class="rpg-system-form__section">
      <h3 class="rpg-system-form__section-title">Informações Básicas</h3>

      <div class="rpg-system-form__fields">
        <div class="rpg-system-form__field">
          <label class="rpg-system-form__label" for="name">Nome do Sistema *</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            class="rpg-system-form__input"
            [(ngModel)]="rpgSystemCreateDto.name" 
            required
            placeholder="Ex: Dungeons & Dragons 5ª Edição"
          >
        </div>

        <div class="rpg-system-form__field">
          <label class="rpg-system-form__label" for="description">Descrição</label>
          <textarea 
            id="description" 
            name="description" 
            class="rpg-system-form__textarea"
            [(ngModel)]="rpgSystemCreateDto.description"
            rows="4"
            placeholder="Breve descrição do sistema, público-alvo, estilo de jogo..."
          ></textarea>
        </div>
      </div>
    </div>

    <div class="rpg-system-form__section">
      <h3 class="rpg-system-form__section-title">Template da Ficha de Personagem (JSON)</h3>
      
      <div class="rpg-system-form__field">
        <label class="rpg-system-form__label" for="template">
          Cole o JSON do schema da ficha aqui
          <small class="rpg-system-form__hint">
            (deve seguir a estrutura esperada pelo buildCharacterForm)
          </small>
        </label>
        <textarea 
          id="template" 
          name="template" 
          class="rpg-system-form__textarea rpg-system-form__textarea--large"
          [(ngModel)]="rpgSystemCreateDto.characterSheetTemplate"
          rows="12"
          placeholder='{ "sections": [ { "name": "Atributos", "fields": [...] } ] }'
        ></textarea>
      </div>
    </div>

    <div class="rpg-system-form__actions">
      <button 
        type="submit" 
        class="rpg-system-form__btn rpg-system-form__btn--primary"
        [disabled]="!systemForm.form.valid || systemForm.form.pristine"
      >
        {{ isEditMode ? 'Salvar Alterações' : 'Criar Sistema' }}
      </button>

      <a 
        [routerLink]="['/admin']" 
        class="rpg-system-form__btn rpg-system-form__btn--secondary"
      >
        Cancelar
      </a>
    </div>
  </form>
</div>
